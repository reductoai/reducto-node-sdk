name: E2E Tests
on:
  pull_request:
    branches:
      - main
      - next

jobs:
  e2e:
    timeout-minutes: 15
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: yarn install

      - name: Run E2E tests
        env:
          REDUCTO_API_KEY: ${{ secrets.REDUCTO_API_KEY }}
        run: npx jest tests/e2e/ --verbose --bail
